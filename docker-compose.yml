x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

networks:
  smartclass_net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  cv_models:
  media_uploads:
  backend_static:
  deepface_models:

services:

  # ── 1. PostgreSQL ────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    container_name: smartclass_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-smartclass}
      POSTGRES_USER:     ${POSTGRES_USER:-smartclass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "9999:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smartclass_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartclass} -d ${POSTGRES_DB:-smartclass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  # ── 2. MongoDB ───────────────────────────────
  mongodb:
    image: mongo:7-jammy
    <<: *default-restart
    container_name: smartclass_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?MONGO_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE:      ${MONGO_DB:-smartclass}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo:/docker-entrypoint-initdb.d:ro
    networks:
      - smartclass_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  # ── 3. Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *default-restart
    container_name: smartclass_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfilename "smartclass.aof"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartclass_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ── 4. Backend ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    <<: *default-restart
    container_name: smartclass_backend
    env_file: .env
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER:-smartclass}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smartclass}
      MONGO_URI:     mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB:-smartclass}?authSource=admin
      REDIS_URL:     redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER: redis://:${REDIS_PASSWORD}@redis:6379/1
      MEDIA_ROOT:    /app/media
      STATIC_ROOT:   /app/static
    volumes:
      - media_uploads:/app/media
      - backend_static:/app/static
    networks:
      - smartclass_net
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "8000:8000"
    logging: *default-logging

  # ── 5. Frontend ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    <<: *default-restart
    container_name: smartclass_frontend
    env_file: .env
    networks:
      - smartclass_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "3000:3000"
    logging: *default-logging

  # ── 6. CV Worker — Absence detection ─────────
  cv_worker:
    build:
      context: ./cv_worker
      dockerfile: Dockerfile
    <<: *default-restart
    container_name: smartclass_cv_worker
    env_file: .env
    environment:
      MONGO_URI:    mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB:-smartclass}?authSource=admin
      BACKEND_URL:  http://backend:8000
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER: redis://:${REDIS_PASSWORD}@redis:6379/1
      # DroidCam WiFi: use your phone's IP directly, e.g. http://192.168.x.x:4747/video
      # DroidCam USB:  use http://host.docker.internal:4747/video
      CAMERA_URL:   ${CAMERA_URL:-http://host.docker.internal:4747/video}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Uncomment the two lines below only when a physical webcam is connected:
    devices:
      - /dev/video0:/dev/video0
    group_add:
      - video
    volumes:
      - media_uploads:/app/media
      - deepface_models:/root/.deepface/weights
    networks:
      - smartclass_net
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      backend:
        condition: service_started
    ports:
      - "5000:5000"
    logging: *default-logging

