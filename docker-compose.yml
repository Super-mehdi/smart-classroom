# ── 6. Backend Celery Worker ─────────────────
  backend_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    <<: *default-restart
    container_name: smartclass_backend_worker
    env_file: .env
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER:-smartclass}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smartclass}
      MONGO_URI:             mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB:-smartclass}?authSource=admin
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER:         redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    command: celery -A tasks.celery_app worker --loglevel=info -Q backend
    networks:
      - smartclass_net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    logging: *default-logging

  # ── 7. Backend Celery Beat ────────────────────
  backend_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    <<: *default-restart
    container_name: smartclass_backend_beat
    env_file: .env
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER:-smartclass}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smartclass}
      MONGO_URI:             mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB:-smartclass}?authSource=admin
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER:         redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    command: celery -A tasks.celery_app beat --loglevel=info
    networks:
      - smartclass_net
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging